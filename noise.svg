      <animate attributeName="stroke-dashoffset" values="0;-120;-420;-60;-520;0" dur=".7s" calcMode="discrete" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".1;.98;.25;.72;.04;.86;.1" dur=".7s" calcMode="discrete" repeatCount="indefinite"/>
