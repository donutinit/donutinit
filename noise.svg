<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".74 .96" numOctaves="4" seed="29">
        <animate attributeName="seed" values="29;83;12;64;37;51;96;18;29" dur=".72s" calcMode="discrete" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values=".2"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues=".02 .2"/>
      </feComponentTransfer>
    </filter>

    <filter id="warp" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="turbulence" baseFrequency=".011 .026" numOctaves="2" seed="8" result="t">
        <animate attributeName="baseFrequency" values=".011 .026;.024 .012;.006 .04;.031 .018;.013 .033;.011 .026" dur=".96s" calcMode="discrete" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="32" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="aura" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feColorMatrix in="b" result="c" type="matrix" values="1.4 0 0 0 .12  0 1.2 0 0 .08  0 0 1.7 0 .35  0 0 0 1 0"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="34%" stop-color="#09111f"/>
      <stop offset="62%" stop-color="#16061d"/>
      <stop offset="100%" stop-color="#030008"/>
    </linearGradient>

    <linearGradient id="chromatic-a" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="22%" stop-color="#7c3aed"/>
      <stop offset="56%" stop-color="#ff2f92"/>
      <stop offset="82%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>

    <linearGradient id="chromatic-b" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="32%" stop-color="#22c55e"/>
      <stop offset="65%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>

    <pattern id="cuts" width="74" height="74" patternUnits="userSpaceOnUse">
      <path d="M0 31H74M19 0V74M63 0V74" stroke="#ffffff" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#base)"/>
  <rect width="1200" height="520" rx="28" filter="url(#grain)"/>
  <rect width="1200" height="520" rx="28" fill="url(#cuts)"/>

  <g opacity=".72">
    <polygon points="18,74 316,28 438,156 176,232" fill="url(#chromatic-a)" opacity=".15">
      <animateTransform attributeName="transform" type="rotate" values="0 228 130;18 228 130;-14 228 130;31 228 130;-6 228 130;0 228 130" dur="1.04s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
    <polygon points="486,32 718,78 632,258 402,204" fill="url(#chromatic-b)" opacity=".17">
      <animateTransform attributeName="transform" type="rotate" values="0 560 146;-22 560 146;15 560 146;-9 560 146;27 560 146;0 560 146" dur=".88s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
    <polygon points="802,42 1240,118 1092,294 742,224" fill="url(#chromatic-a)" opacity=".14">
