<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Puro ruido</title>
  <desc id="desc">Composición abstracta animada con estática, líneas rotas y pulsos de color.</desc>
  <defs>
    <filter id="static">
      <feTurbulence type="fractalNoise" baseFrequency=".88" numOctaves="3" seed="13">
        <animate attributeName="seed" values="13;47;91;21;13" dur="1.6s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .18"/>
      </feComponentTransfer>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" result="hot" type="matrix" values="1.3 0 0 0 .08  0 1.1 0 0 .18  0 0 1.6 0 .55  0 0 0 1 0"/>
      <feMerge>
        <feMergeNode in="hot"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="42%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#050008"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="32%" stop-color="#a855f7"/>
      <stop offset="62%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>

    <pattern id="scan" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 1H12" stroke="#ffffff" stroke-opacity=".08"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#night)"/>
  <rect width="1200" height="520" rx="28" filter="url(#static)"/>
  <rect width="1200" height="520" rx="28" fill="url(#scan)"/>

  <g opacity=".78" filter="url(#glow)">
    <path d="M-40 132 C118 62 226 206 366 126 S594 38 734 146 964 264 1240 88" fill="none" stroke="url(#neon)" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 24">
      <animate attributeName="stroke-dashoffset" from="0" to="-520" dur="5.5s" repeatCount="indefinite"/>
    </path>
    <path d="M-60 354 C142 250 300 438 454 326 S732 188 898 330 1066 438 1260 246" fill="none" stroke="url(#neon)" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 38">
      <animate attributeName="stroke-dashoffset" from="0" to="480" dur="4.2s" repeatCount="indefinite"/>
    </path>
    <path d="M52 258 H226 L250 226 L284 296 L326 194 L362 258 H520 L548 220 L590 312 L640 164 L690 258 H1148" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-opacity=".52" stroke-linejoin="round" stroke-dasharray="4 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity=".9">
    <rect x="120" y="82" width="132" height="10" fill="#22d3ee">
      <animate attributeName="x" values="120;184;120" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".25;.9;.25" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="894" y="390" width="192" height="10" fill="#f43f5e">
      <animate attributeName="x" values="894;820;894" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;.84;.2" dur="2.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="432" y="442" width="82" height="8" fill="#facc15">
      <animate attributeName="x" values="432;478;432" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".18;.78;.18" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle" filter="url(#glow)">
    <text x="600" y="252" fill="#f8fafc" font-size="62" letter-spacing="12">PURO RUIDO</text>
    <text x="600" y="294" fill="#94a3b8" font-size="15" letter-spacing="8">ESTATICA / DISTORSION / FEEDBACK</text>
    <animateTransform attributeName="transform" type="translate" values="0 0; 6 0; -4 0; 0 0" dur=".72s" repeatCount="indefinite"/>
  </g>

  <g opacity=".42">
    <circle cx="270" cy="256" r="96" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="2 18">
      <animateTransform attributeName="transform" type="rotate" from="0 270 256" to="360 270 256" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="260" r="124" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 22">
      <animateTransform attributeName="transform" type="rotate" from="360 930 260" to="0 930 260" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
