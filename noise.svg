<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".74 .96" numOctaves="4" seed="29">
        <animate attributeName="seed" values="29;83;12;64;37;29" dur="1.25s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values=".2"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues=".02 .2"/>
      </feComponentTransfer>
    </filter>

    <filter id="warp" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="turbulence" baseFrequency=".011 .026" numOctaves="2" seed="8" result="t">
        <animate attributeName="baseFrequency" values=".011 .026;.018 .018;.009 .032;.011 .026" dur="9s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="32" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="aura" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feColorMatrix in="b" result="c" type="matrix" values="1.4 0 0 0 .12  0 1.2 0 0 .08  0 0 1.7 0 .35  0 0 0 1 0"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="34%" stop-color="#09111f"/>
      <stop offset="62%" stop-color="#16061d"/>
      <stop offset="100%" stop-color="#030008"/>
    </linearGradient>

    <linearGradient id="chromatic-a" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="22%" stop-color="#7c3aed"/>
      <stop offset="56%" stop-color="#ff2f92"/>
      <stop offset="82%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>

    <linearGradient id="chromatic-b" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="32%" stop-color="#22c55e"/>
      <stop offset="65%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>

    <pattern id="cuts" width="74" height="74" patternUnits="userSpaceOnUse">
      <path d="M0 31H74M19 0V74M63 0V74" stroke="#ffffff" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#base)"/>
  <rect width="1200" height="520" rx="28" filter="url(#grain)"/>
  <rect width="1200" height="520" rx="28" fill="url(#cuts)"/>

  <g opacity=".72">
    <polygon points="18,74 316,28 438,156 176,232" fill="url(#chromatic-a)" opacity=".15">
      <animateTransform attributeName="transform" type="rotate" values="0 228 130;11 228 130;-7 228 130;0 228 130" dur="9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="486,32 718,78 632,258 402,204" fill="url(#chromatic-b)" opacity=".17">
      <animateTransform attributeName="transform" type="rotate" values="0 560 146;-13 560 146;8 560 146;0 560 146" dur="8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="802,42 1240,118 1092,294 742,224" fill="url(#chromatic-a)" opacity=".14">
      <animateTransform attributeName="transform" type="rotate" values="0 996 168;9 996 168;-10 996 168;0 996 168" dur="10.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="-42,338 218,250 388,410 94,512" fill="url(#chromatic-b)" opacity=".18">
      <animateTransform attributeName="transform" type="rotate" values="0 172 388;-10 172 388;7 172 388;0 172 388" dur="9.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="438,336 704,256 836,474 526,518" fill="url(#chromatic-a)" opacity=".16">
      <animateTransform attributeName="transform" type="rotate" values="0 632 392;12 632 392;-6 632 392;0 632 392" dur="7.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="860,318 1168,252 1250,466 946,520" fill="url(#chromatic-b)" opacity=".16">
      <animateTransform attributeName="transform" type="rotate" values="0 1042 396;-8 1042 396;12 1042 396;0 1042 396" dur="8.8s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#aura)">
    <path d="M-46 176C112 124 184 298 324 198S526 48 672 212 904 354 1038 210 1158 112 1258 166" stroke="url(#chromatic-a)" stroke-width="3" stroke-dasharray="2 24">
      <animate attributeName="stroke-dashoffset" values="0;-520" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;.95;.35;.72;.2" dur="6.5s" repeatCount="indefinite"/>
    </path>
    <path d="M-54 306C92 404 210 180 344 314S598 448 724 272 912 142 1058 292 1198 382 1268 288" stroke="url(#chromatic-b)" stroke-width="5" stroke-dasharray="18 34">
      <animate attributeName="stroke-dashoffset" values="0;640" dur="6.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".82;.24;.64;.18;.82" dur="7.1s" repeatCount="indefinite"/>
    </path>
    <path d="M86 262 180 218 246 332 337 162 466 304 548 192 650 350 766 154 852 314 970 236 1112 278" stroke="#f8fafc" stroke-width="1.4" stroke-opacity=".34" stroke-dasharray="1 17">
      <animate attributeName="stroke-dashoffset" values="0;-220" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity=".88">
    <rect x="94" y="74" width="226" height="9" fill="#00e5ff">
      <animate attributeName="x" values="94;146;74;94" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".12;.86;.28;.12" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="756" y="126" width="78" height="7" fill="#39ff14">
      <animate attributeName="x" values="756;828;720;756" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".22;.92;.16;.22" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="872" y="378" width="238" height="11" fill="#ff2f92">
      <animate attributeName="x" values="872;802;918;872" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".16;.78;.3;.16" dur="3.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="412" y="448" width="102" height="8" fill="#ffb703">
      <animate attributeName="x" values="412;470;388;412" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".24;.82;.18;.24" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity=".54" filter="url(#aura)">
    <polygon points="238,196 284,154 318,238 258,266" fill="#7c3aed">
      <animateTransform attributeName="transform" type="rotate" values="0 278 214;42 278 214;-18 278 214;0 278 214" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".16;.62;.28;.16" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="614,96 704,134 662,218 568,176" fill="#06b6d4">
      <animateTransform attributeName="transform" type="rotate" values="0 636 156;-36 636 156;24 636 156;0 636 156" dur="8.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".18;.7;.32;.18" dur="4.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="836,280 954,242 1014,348 884,392" fill="#f97316">
      <animateTransform attributeName="transform" type="rotate" values="0 925 318;26 925 318;-30 925 318;0 925 318" dur="9.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".12;.58;.24;.12" dur="6.1s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>
